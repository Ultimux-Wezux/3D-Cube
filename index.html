<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Cube</title>
    <style>
        :root {
            --cube-color: #7c5cfc;
            --bg: #0f0f1a;
            --panel-bg: rgba(22, 22, 40, 0.85);
            --text: #e0e0f0;
            --accent: #a78bfa;
            --slider-track: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            cursor: crosshair;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-image:
                radial-gradient(ellipse at 50% 50%, rgba(120, 80, 240, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 20% 80%, rgba(100, 140, 240, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(200, 100, 220, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Subtle dot grid overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.25;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.25) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        /* Main container */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        /* Scene with perspective */
        .scene {
            perspective: 900px;
            perspective-origin: 50% 50%;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Dynamic shadow on the "ground" */
        .ground-shadow {
            position: absolute;
            bottom: -10px;
            left: 50%;
            width: 140px;
            height: 30px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.55) 0%, transparent 70%);
            border-radius: 50%;
            transform: translateX(-50%) translateX(var(--shadow-shift-x, 0px)) translateY(var(--shadow-shift-y, 0px));
            transition: transform 0.05s linear;
            pointer-events: none;
            z-index: 0;
            filter: blur(6px);
        }

        /* Cube wrapper – receives the 3D rotation */
        .cube {
            width: 170px;
            height: 170px;
            transform-style: preserve-3d;
            position: relative;
            z-index: 2;
            will-change: transform;
            transition: none;
        }

        /* Each face */
        .face {
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 14px;
            backface-visibility: visible;
            border: 2px solid rgba(255, 255, 255, 0.18);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: background-color 0.25s ease, border-color 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            pointer-events: none;
        }

        .face.front {
            transform: translateZ(85px);
            background-color: var(--face-front);
        }
        .face.back {
            transform: translateZ(-85px) rotateY(180deg);
            background-color: var(--face-back);
        }
        .face.right {
            transform: translateX(85px) rotateY(90deg);
            background-color: var(--face-right);
        }
        .face.left {
            transform: translateX(-85px) rotateY(-90deg);
            background-color: var(--face-left);
        }
        .face.top {
            transform: translateY(-85px) rotateX(90deg);
            background-color: var(--face-top);
        }
        .face.bottom {
            transform: translateY(85px) rotateX(-90deg);
            background-color: var(--face-bottom);
        }

        /* Face label styling */
        .face span {
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
            opacity: 0.75;
            font-size: 0.7rem;
        }

        /* ============ CONTROL PANEL ============ */
        .control-panel {
            position: relative;
            z-index: 10;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.6rem 2rem 1.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1.6rem 2.2rem;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.45),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 1px 0 rgba(255, 255, 255, 0.06) inset;
            max-width: 95vw;
            transition: all 0.3s ease;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            align-items: center;
        }

        .control-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 600;
            white-space: nowrap;
        }

        /* Color picker */
        .color-picker-wrapper {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: border-color 0.25s, box-shadow 0.25s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }
        .color-picker-wrapper:hover {
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 6px 22px rgba(0, 0, 0, 0.45), 0 0 20px rgba(160, 120, 255, 0.3);
        }
        .color-picker-wrapper input[type="color"] {
            position: absolute;
            width: 140%;
            height: 140%;
            top: -20%;
            left: -20%;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
        }
        .color-picker-wrapper input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        .color-picker-wrapper input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }

        /* Range slider */
        .slider-group {
            flex: 1;
            min-width: 100px;
            max-width: 180px;
        }
        .slider-group input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: var(--slider-track);
            outline: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.35);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.15);
            box-shadow: 0 5px 18px rgba(0, 0, 0, 0.5);
        }
        .slider-value {
            font-size: 0.75rem;
            color: var(--text);
            font-weight: 600;
            min-width: 32px;
            text-align: center;
        }

        /* Toggle switch */
        .toggle-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.45rem;
        }
        .toggle-switch {
            position: relative;
            width: 60px;
            height: 32px;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            top: 3px;
            left: 3px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .toggle-switch input:checked+.toggle-slider {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 18px rgba(140, 100, 250, 0.4);
        }
        .toggle-switch input:checked+.toggle-slider::before {
            transform: translateX(28px);
            background: #fff;
        }
        .toggle-mode-label {
            font-size: 0.68rem;
            color: var(--text);
            font-weight: 500;
            letter-spacing: 0.03em;
            transition: color 0.3s;
            white-space: nowrap;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .scene {
                width: 220px;
                height: 220px;
            }
            .cube {
                width: 120px;
                height: 120px;
            }
            .face {
                width: 120px;
                height: 120px;
                border-radius: 10px;
            }
            .face.front {
                transform: translateZ(60px);
            }
            .face.back {
                transform: translateZ(-60px) rotateY(180deg);
            }
            .face.right {
                transform: translateX(60px) rotateY(90deg);
            }
            .face.left {
                transform: translateX(-60px) rotateY(-90deg);
            }
            .face.top {
                transform: translateY(-60px) rotateX(90deg);
            }
            .face.bottom {
                transform: translateY(60px) rotateX(-90deg);
            }
            .face span {
                font-size: 0.55rem;
            }
            .ground-shadow {
                width: 100px;
                height: 22px;
                bottom: -6px;
            }
            .control-panel {
                padding: 1.2rem 1.2rem;
                gap: 1rem 1.2rem;
                border-radius: 16px;
            }
            .control-label {
                font-size: 0.6rem;
            }
            .slider-group {
                max-width: 100px;
            }
            .toggle-switch {
                width: 50px;
                height: 28px;
            }
            .toggle-slider::before {
                width: 20px;
                height: 20px;
                top: 3px;
                left: 3px;
            }
            .toggle-switch input:checked+.toggle-slider::before {
                transform: translateX(22px);
            }
        }

        @media (max-width: 400px) {
            .control-panel {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                padding: 1rem 1.4rem;
            }
            .slider-group {
                max-width: 100%;
                width: 100%;
            }
            .scene {
                width: 180px;
                height: 180px;
            }
            .cube {
                width: 100px;
                height: 100px;
            }
            .face {
                width: 100px;
                height: 100px;
                border-radius: 8px;
                border-width: 1.5px;
            }
            .face.front {
                transform: translateZ(50px);
            }
            .face.back {
                transform: translateZ(-50px) rotateY(180deg);
            }
            .face.right {
                transform: translateX(50px) rotateY(90deg);
            }
            .face.left {
                transform: translateX(-50px) rotateY(-90deg);
            }
            .face.top {
                transform: translateY(-50px) rotateX(90deg);
            }
            .face.bottom {
                transform: translateY(50px) rotateX(-90deg);
            }
            .face span {
                font-size: 0.5rem;
            }
            .ground-shadow {
                width: 70px;
                height: 16px;
                bottom: -4px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 3D Scene -->
        <div class="scene" id="scene">
            <div class="ground-shadow" id="groundShadow"></div>
            <div class="cube" id="cube">
                <div class="face front"><span>Front</span></div>
                <div class="face back"><span>Back</span></div>
                <div class="face right"><span>Right</span></div>
                <div class="face left"><span>Left</span></div>
                <div class="face top"><span>Top</span></div>
                <div class="face bottom"><span>Bottom</span></div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel" id="controlPanel">
            <!-- Color Picker -->
            <div class="control-group">
                <span class="control-label">Color</span>
                <div class="color-picker-wrapper" id="colorPickerWrapper">
                    <input type="color" id="colorPicker" value="#7c5cfc" title="Change cube color">
                </div>
            </div>

            <!-- Smoothness / Speed Slider -->
            <div class="control-group slider-group">
                <span class="control-label" id="sliderLabel">Smoothness</span>
                <input type="range" id="smoothnessSlider" min="1" max="100" value="35" title="Adjust smoothness / speed">
                <span class="slider-value" id="sliderValueDisplay">35</span>
            </div>

            <!-- Mode Toggle -->
            <div class="control-group toggle-group">
                <span class="control-label">Mode</span>
                <label class="toggle-switch" title="Toggle Follow / Auto-Rotate">
                    <input type="checkbox" id="modeToggle">
                    <span class="toggle-slider"></span>
                </label>
                <span class="toggle-mode-label" id="modeLabel">Follow Cursor</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ─────────────────────────────────────
            // DOM ELEMENTS
            // ─────────────────────────────────────
            const cube = document.getElementById('cube');
            const groundShadow = document.getElementById('groundShadow');
            const colorPicker = document.getElementById('colorPicker');
            const colorPickerWrapper = document.getElementById('colorPickerWrapper');
            const smoothnessSlider = document.getElementById('smoothnessSlider');
            const sliderValueDisplay = document.getElementById('sliderValueDisplay');
            const sliderLabel = document.getElementById('sliderLabel');
            const modeToggle = document.getElementById('modeToggle');
            const modeLabel = document.getElementById('modeLabel');

            // ─────────────────────────────────────
            // STATE
            // ─────────────────────────────────────
            let currentRotX = 0;
            let currentRotY = 0;
            let targetRotX = 0;
            let targetRotY = 0;
            let mode = 'follow'; // 'follow' | 'auto'
            let cubeColor = '#7c5cfc';
            let smoothnessValue = 35; // 1-100
            let mouseX = 0;
            let mouseY = 0;
            let mouseOnScreen = false;
            let autoTime = 0;
            let animationId = null;

            // ─────────────────────────────────────
            // COLOR UTILITIES
            // ─────────────────────────────────────
            function hexToHsl(hex) {
                let r, g, b;
                hex = hex.replace('#', '');
                if (hex.length === 3) {
                    r = parseInt(hex[0] + hex[0], 16) / 255;
                    g = parseInt(hex[1] + hex[1], 16) / 255;
                    b = parseInt(hex[2] + hex[2], 16) / 255;
                } else {
                    r = parseInt(hex.substring(0, 2), 16) / 255;
                    g = parseInt(hex.substring(2, 4), 16) / 255;
                    b = parseInt(hex.substring(4, 6), 16) / 255;
                }
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                const l = (max + min) / 2;
                let h = 0,
                    s = 0;
                if (max !== min) {
                    const d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r:
                            h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
                            break;
                        case g:
                            h = ((b - r) / d + 2) / 6;
                            break;
                        case b:
                            h = ((r - g) / d + 4) / 6;
                            break;
                    }
                }
                return { h: h * 360, s: s * 100, l: l * 100 };
            }

            function hslToHex(h, s, l) {
                h = h % 360;
                s = Math.max(0, Math.min(100, s)) / 100;
                l = Math.max(0, Math.min(100, l)) / 100;
                const c = (1 - Math.abs(2 * l - 1)) * s;
                const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
                const m = l - c / 2;
                let r, g, b;
                if (h < 60) { r = c;
                    g = x;
                    b = 0; } else if (h < 120) { r = x;
                    g = c;
                    b = 0; } else if (h < 180) { r = 0;
                    g = c;
                    b = x; } else if (h < 240) { r = 0;
                    g = x;
                    b = c; } else if (h < 300) { r = x;
                    g = 0;
                    b = c; } else { r = c;
                    g = 0;
                    b = x; }
                r = Math.round((r + m) * 255);
                g = Math.round((g + m) * 255);
                b = Math.round((b + m) * 255);
                const toHex = (n) => n.toString(16).padStart(2, '0');
                return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
            }

            function adjustLightness(hex, deltaPercent) {
                const hsl = hexToHsl(hex);
                const newL = Math.max(5, Math.min(95, hsl.l + deltaPercent));
                return hslToHex(hsl.h, hsl.s, newL);
            }

            // ─────────────────────────────────────
            // APPLY CUBE COLORS (CSS custom props)
            // ─────────────────────────────────────
            function applyCubeColors(baseColor) {
                const root = document.documentElement;
                root.style.setProperty('--face-front', baseColor);
                root.style.setProperty('--face-back', adjustLightness(baseColor, -22));
                root.style.setProperty('--face-right', adjustLightness(baseColor, -9));
                root.style.setProperty('--face-left', adjustLightness(baseColor, -16));
                root.style.setProperty('--face-top', adjustLightness(baseColor, +13));
                root.style.setProperty('--face-bottom', adjustLightness(baseColor, -28));
            }

            // ─────────────────────────────────────
            // UPDATE COLOR PICKER WRAPPER BG
            // ─────────────────────────────────────
            function updateColorPickerPreview(color) {
                colorPickerWrapper.style.backgroundColor = color;
            }

            // ─────────────────────────────────────
            // GET LERP FACTOR FROM SLIDER
            // ─────────────────────────────────────
            function getLerpFactor() {
                // Map 1-100 → 0.015 (very smooth) to 0.45 (very snappy)
                const normalized = smoothnessValue / 100; // 0.01 to 1.0
                // Use exponential mapping for more natural feel
                return 0.012 + normalized * normalized * 0.50;
            }

            function getAutoRotateSpeed() {
                // Map 1-100 → 0.15 to 3.5 degrees per frame at 60fps
                const normalized = smoothnessValue / 100;
                return 0.15 + normalized * normalized * 3.8;
            }

            // ─────────────────────────────────────
            // NORMALIZE ANGLE TO NEAREST EQUIVALENT
            // ─────────────────────────────────────
            function nearestAngleEquivalent(current, target) {
                // Bring current to the equivalent within [-180, 180] of target
                const diff = ((current - target + 180) % 360 + 360) % 360 - 180;
                return target + diff;
            }

            // ─────────────────────────────────────
            // ANIMATION LOOP
            // ─────────────────────────────────────
            function animate(timestamp) {
                const dt = Math.min((timestamp - (animate.lastTimestamp || timestamp)) / 1000, 0.2);
                animate.lastTimestamp = timestamp;
                autoTime += dt;

                if (mode === 'follow') {
                    // Target comes from mouse position
                    if (mouseOnScreen) {
                        targetRotY = mouseX * 48; // ±48 degrees
                        targetRotX = -mouseY * 34; // ±34 degrees
                    } else {
                        targetRotY = 0;
                        targetRotX = 0;
                    }
                } else {
                    // Auto-rotate mode
                    const speed = getAutoRotateSpeed();
                    targetRotY += speed * dt * 60; // scale so it feels consistent
                    targetRotX = Math.sin(autoTime * 0.65) * 26 + Math.sin(autoTime * 1.3) * 8;
                }

                // Lerp current toward target
                const lerpFactor = getLerpFactor();
                // Clamp lerp factor per frame to avoid overshoot at low framerates
                const effectiveLerp = Math.min(lerpFactor * dt * 60, 0.85);

                currentRotX += (targetRotX - currentRotX) * effectiveLerp;
                currentRotY += (targetRotY - currentRotY) * effectiveLerp;

                // Apply rotation to cube
                cube.style.transform = `rotateX(${currentRotX.toFixed(3)}deg) rotateY(${currentRotY.toFixed(3)}deg)`;

                // Update ground shadow position
                const shadowShiftX = currentRotY * 0.35;
                const shadowShiftY = Math.abs(currentRotX) * 0.3 + Math.abs(Math.sin(currentRotY * Math.PI / 180)) *
                    8;
                groundShadow.style.setProperty('--shadow-shift-x', `${shadowShiftX.toFixed(1)}px`);
                groundShadow.style.setProperty('--shadow-shift-y', `${shadowShiftY.toFixed(1)}px`);

                // Adjust shadow opacity based on "height" (X rotation)
                const shadowOpacity = 0.35 + Math.abs(currentRotX) / 120;
                groundShadow.style.opacity = Math.min(0.7, Math.max(0.25, shadowOpacity));

                animationId = requestAnimationFrame(animate);
            }
            animate.lastTimestamp = performance.now();

            // ─────────────────────────────────────
            // MOUSE TRACKING
            // ─────────────────────────────────────
            function updateMousePosition(e) {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                mouseX = (e.clientX - centerX) / centerX; // -1 to 1
                mouseY = (e.clientY - centerY) / centerY; // -1 to 1
                // Clamp to prevent extreme values if mouse is far out
                mouseX = Math.max(-1.3, Math.min(1.3, mouseX));
                mouseY = Math.max(-1.3, Math.min(1.3, mouseY));
                mouseOnScreen = true;
            }

            document.addEventListener('mousemove', updateMousePosition, { passive: true });
            document.addEventListener('mouseenter', () => { mouseOnScreen = true; });
            document.addEventListener('mouseleave', () => {
                mouseOnScreen = false;
                if (mode === 'follow') {
                    targetRotX = 0;
                    targetRotY = 0;
                }
            });

            // Touch support
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;
                    mouseX = (touch.clientX - centerX) / centerX;
                    mouseY = (touch.clientY - centerY) / centerY;
                    mouseX = Math.max(-1.3, Math.min(1.3, mouseX));
                    mouseY = Math.max(-1.3, Math.min(1.3, mouseY));
                    mouseOnScreen = true;
                }
            }, { passive: true });
            document.addEventListener('touchend', () => {
                mouseOnScreen = false;
                if (mode === 'follow') {
                    targetRotX = 0;
                    targetRotY = 0;
                }
            });

            // ─────────────────────────────────────
            // CONTROL PANEL HANDLERS
            // ─────────────────────────────────────

            // Color Picker
            colorPicker.addEventListener('input', (e) => {
                cubeColor = e.target.value;
                applyCubeColors(cubeColor);
                updateColorPickerPreview(cubeColor);
            });

            // Smoothness Slider
            smoothnessSlider.addEventListener('input', () => {
                smoothnessValue = parseInt(smoothnessSlider.value);
                sliderValueDisplay.textContent = smoothnessValue;
                updateSliderLabel();
            });

            function updateSliderLabel() {
                if (mode === 'follow') {
                    sliderLabel.textContent = 'Smoothness';
                } else {
                    sliderLabel.textContent = 'Speed';
                }
            }

            // Mode Toggle
            modeToggle.addEventListener('change', () => {
                if (modeToggle.checked) {
                    // Switch to Auto-Rotate
                    mode = 'auto';
                    modeLabel.textContent = 'Auto-Rotate';
                    // Keep current rotations as starting point
                    targetRotY = currentRotY;
                    targetRotX = currentRotX;
                    autoTime = 0;
                } else {
                    // Switch to Follow Cursor
                    mode = 'follow';
                    modeLabel.textContent = 'Follow Cursor';
                    // Normalize targetRotY to a reasonable range near mouse-derived target
                    const mouseTargetY = mouseOnScreen ? mouseX * 48 : 0;
                    const mouseTargetX = mouseOnScreen ? -mouseY * 34 : 0;
                    targetRotY = mouseTargetY;
                    targetRotX = mouseTargetX;
                    // Smoothly bring current rotations to reasonable equivalents
                    currentRotY = nearestAngleEquivalent(currentRotY, targetRotY);
                    currentRotX = nearestAngleEquivalent(currentRotX, targetRotX);
                }
                updateSliderLabel();
            });

            // ─────────────────────────────────────
            // INITIALIZATION
            // ─────────────────────────────────────
            function init() {
                applyCubeColors(cubeColor);
                updateColorPickerPreview(cubeColor);
                smoothnessValue = parseInt(smoothnessSlider.value);
                sliderValueDisplay.textContent = smoothnessValue;
                updateSliderLabel();
                modeLabel.textContent = 'Follow Cursor';
                modeToggle.checked = false;
                mode = 'follow';
                // Start animation
                animationId = requestAnimationFrame(animate);
            }

            // ─────────────────────────────────────
            // HANDLE WINDOW RESIZE
            // ─────────────────────────────────────
            function handleResize() {
                // Recalculate mouse position if on screen
                if (mouseOnScreen && mode === 'follow') {
                    // Mouse position stays relative; targets will update on next mousemove
                }
            }
            window.addEventListener('resize', handleResize, { passive: true });

            // ─────────────────────────────────────
            // KEYBOARD SHORTCUTS
            // ─────────────────────────────────────
            window.addEventListener('keydown', (e) => {
                switch (e.key.toLowerCase()) {
                    case 't':
                        // Toggle mode
                        modeToggle.checked = !modeToggle.checked;
                        modeToggle.dispatchEvent(new Event('change'));
                        break;
                    case 'r':
                        // Reset to defaults
                        cubeColor = '#7c5cfc';
                        colorPicker.value = cubeColor;
                        applyCubeColors(cubeColor);
                        updateColorPickerPreview(cubeColor);
                        smoothnessSlider.value = 35;
                        smoothnessValue = 35;
                        sliderValueDisplay.textContent = '35';
                        updateSliderLabel();
                        if (modeToggle.checked) {
                            modeToggle.checked = false;
                            modeToggle.dispatchEvent(new Event('change'));
                        }
                        currentRotX = 0;
                        currentRotY = 0;
                        targetRotX = 0;
                        targetRotY = 0;
                        break;
                    case '1':
                        // Quick color: purple
                        cubeColor = '#7c5cfc';
                        colorPicker.value = cubeColor;
                        applyCubeColors(cubeColor);
                        updateColorPickerPreview(cubeColor);
                        break;
                    case '2':
                        // Quick color: teal
                        cubeColor = '#0ed9b0';
                        colorPicker.value = cubeColor;
                        applyCubeColors(cubeColor);
                        updateColorPickerPreview(cubeColor);
                        break;
                    case '3':
                        // Quick color: coral
                        cubeColor = '#ff6b6b';
                        colorPicker.value = cubeColor;
                        applyCubeColors(cubeColor);
                        updateColorPickerPreview(cubeColor);
                        break;
                    case '4':
                        // Quick color: gold
                        cubeColor = '#f9a825';
                        colorPicker.value = cubeColor;
                        applyCubeColors(cubeColor);
                        updateColorPickerPreview(cubeColor);
                        break;
                    default:
                        break;
                }
            });

            // ─────────────────────────────────────
            // START
            // ─────────────────────────────────────
            init();

            console.log('%c✨ 3D Interactive Cube Ready %c| %cMove your mouse! %c| %cPress T to toggle mode %c| %cPress R to reset %c| %cKeys 1-4 for quick colors',
                'font-size:1.1em;font-weight:bold;color:#a78bfa;',
                '',
                'color:#ccc;',

                'color:#aaa;',

                'color:#aaa;',

                'color:#aaa;');
            console.log('%c🖱️  Follow Cursor mode: cube tracks your mouse with smooth interpolation',
                'color:#ddd;');
            console.log('%c🔄  Auto-Rotate mode: cube spins continuously with adjustable speed',
                'color:#ddd;');
            console.log('%c🎨  Use the control panel below to customize color, smoothness/speed, and mode.',
                'color:#ddd;');
        })();
